<!doctype html>
<head>
    <script src="index.js" type="module" defer></script>
</head>
<h1>2.2 to OMNImenu gmd converter</h1>
<form>
    <input type="file" id="file" required>
    <br>
    <label for="version">Select Version (1.0-1.8)</label>
    <input type="text" pattern="^1\.[0-8]$" name="version" id="version" required>
    <br>
    <button type="submit">Convert</button>
</form>
